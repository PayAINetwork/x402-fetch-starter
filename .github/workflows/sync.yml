name: Sync upstream x402 clients/fetch
permissions:
  contents: write
  pull-requests: write
  issues: write
on:
  schedule: [ { cron: "0 * * * *" } ]  # hourly
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write }
    env:
      UPSTREAM_REPO: coinbase/x402
      UPSTREAM_PATH: examples/typescript/clients/fetch
    steps:
      - uses: actions/checkout@v4

      - name: Sparse clone upstream
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/${UPSTREAM_REPO}.git upstream
          cd upstream
          git sparse-checkout set "${UPSTREAM_PATH}"
          echo "UPSTREAM_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Resolve latest @x402/fetch version from npm
        run: |
          set -euo pipefail
          VERSION=$(npm view @x402/fetch version 2>/dev/null || echo "0.0.0")
          echo "X402_FETCH_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Record resolved version in root package.json
        run: |
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));(j.config??={});j.config.x402FetchVersion=process.env.X402_FETCH_VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2));"

      - name: Stage upstream into vendor folder
        run: |
          rm -rf vendor/upstream && mkdir -p vendor/upstream
          rsync -a --delete upstream/${UPSTREAM_PATH}/ vendor/upstream/

      - name: Sanitize & map into template (best-effort)
        run: |
          chmod +x scripts/sanitize.sh
          scripts/sanitize.sh "${UPSTREAM_PATH}" "${UPSTREAM_SHA}"

      - name: Inject x402 package versions into template/package.json
        run: |
          node <<'EOF'
          const fs = require('fs');
          const p = 'template/package.json';
          if (!fs.existsSync(p)) process.exit(0);
          const j = JSON.parse(fs.readFileSync(p, 'utf8'));
          const v = process.env.X402_FETCH_VERSION;
          if (!v || v === '0.0.0') process.exit(0);

          j.dependencies = j.dependencies || {};
          // Ensure all required x402 packages are present with correct versions
          const x402Packages = ['@x402/fetch', '@x402/evm', '@x402/svm'];
          for (const pkg of x402Packages) {
            j.dependencies[pkg] = '^' + v;
          }

          fs.writeFileSync(p, JSON.stringify(j, null, 2));
          console.log(`Set x402 packages to ^${v}`);
          EOF

      - name: Determine if there are changes
        run: |
          # include untracked files in change detection
          if git diff --quiet && git ls-files --others --exclude-standard --error-unmatch . >/dev/null 2>&1; then
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Bump starter package version to follow upstream
        if: ${{ env.HAS_CHANGES == 'true' }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const p = 'package.json';
          const j = JSON.parse(fs.readFileSync(p, 'utf-8'));

          const upstream = process.env.X402_FETCH_VERSION || '0.0.0';
          const [upMajor, upMinor] = upstream.split('.').map(Number);
          const [curMajor, curMinor, curPatch] = (j.version || '0.0.0').split('.').map(Number);

          if (curMajor === upMajor && curMinor === upMinor) {
            j.version = `${upMajor}.${upMinor}.${curPatch + 1}`;
          } else {
            j.version = `${upMajor}.${upMinor}.0`;
          }

          fs.writeFileSync(p, JSON.stringify(j, null, 2));
          console.log(`Starter version set to ${j.version} (tracking @x402/fetch@${upstream})`);
          EOF
        env:
          X402_FETCH_VERSION: ${{ env.X402_FETCH_VERSION }}

      - name: Open PR with changes
        uses: peter-evans/create-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit-message: "chore(fetch): sync from ${UPSTREAM_REPO}@${{ env.UPSTREAM_SHA }}"
          branch: chore/sync-upstream
          title: "Sync upstream (clients/fetch) — ${{ env.UPSTREAM_SHA }}"
          body: |
            Auto-synced from https://github.com/${{ env.UPSTREAM_REPO }}
            Path: ${{ env.UPSTREAM_PATH }}
            SHA:  ${{ env.UPSTREAM_SHA }}
